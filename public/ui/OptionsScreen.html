<div class="menu">
  <div class="header">
    <h5>TOP WAVY</h5>
  </div>
  <div class="content">
    <div class="body">
      <div>
        <h4>Wave configuration</h4>
      </div>
      <div>
        <form id="optionsForm">
          <div>
            <div>Max Wave</div>
            <input id="max" type="number" min="1" max="100" value="1" />
          </div>
          <div>
            <div>Enemies per Wave</div>
            <input id="exw" type="number" min="1" max="100" value="2" />
          </div>
          <div>
            <div>Sleep between waves</div>
            <input id="sleep" type="number" min="0" max="100" value="0.5" />
          </div>
        </form>
      </div>
    </div>
    <div class="footer">
      <button id="back">Back</button>
      <button id="save">Save</button>
    </div>
  </div>
</div>
