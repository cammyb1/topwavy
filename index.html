<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jael-topdown</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      canvas {
        width: 100vh;
        height: 100vw;
        display: block;
      }
      #ui {
        width: 100%;
        height: 100%;
        position: absolute;
        user-select: none;
        top: 0;
        left: 0;
        z-index: 1;
      }
      @keyframes easein {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }
      .full-screen {
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        width: 100%;
        height: 100%;
        opacity: 0;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 50px;
        font-family: "calibri";
        text-transform: uppercase;
        animation: easein 0.5s forwards;
      }
    </style>
  </head>
  <body>
    <canvas></canvas>
    <div id="ui">
      <div id="loader" class="full-screen">
        <div>0 %</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
